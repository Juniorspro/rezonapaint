<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#6366F1" />
    <title>Rezopaint Game · Dibuja y adivina online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { fontFamily: { sans: ["Fredoka", "system-ui", "sans-serif"] } } } };
    </script>
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      body {
        margin: 0; font-family: "Fredoka", system-ui, sans-serif;
        background: linear-gradient(135deg, #fef3f9 0%, #f0f4ff 50%, #ecfeff 100%);
        background-attachment: fixed; color: #1e293b; min-height: 100vh;
        overflow-x: hidden; user-select: none; -webkit-user-select: none;
      }
      input, textarea { user-select: text; -webkit-user-select: text; }
      .r-card { background: #fff; border-radius: 18px; box-shadow: 0 4px 16px rgba(15,23,42,.06), 0 1px 3px rgba(15,23,42,.04); }
      .r-card-soft { background: #fff; border-radius: 14px; box-shadow: 0 2px 8px rgba(15,23,42,.05); }
      .r-btn { font-family: "Fredoka", sans-serif; font-weight: 600; transition: transform .1s, box-shadow .1s; cursor: pointer; }
      .r-btn:active:not(:disabled) { transform: translateY(1px); }
      .r-btn:disabled { cursor: not-allowed; }
      .r-input { font-family: "Fredoka", sans-serif; font-weight: 500; outline: none; transition: box-shadow .15s, border-color .15s; }
      .r-input:focus { box-shadow: 0 0 0 3px rgba(99,102,241,.2); border-color: #6366f1; }
      @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
      @keyframes pop { 0%{transform:scale(.7);opacity:0;} 70%{transform:scale(1.06);} 100%{transform:scale(1);opacity:1;} }
      @keyframes pulseWarn { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
      @keyframes confetti { 0%{transform:translateY(-20px) rotate(0);opacity:1;} 100%{transform:translateY(120vh) rotate(720deg);opacity:0;} }
      @keyframes shimmer { 0%{background-position:-200px 0;} 100%{background-position:200px 0;} }
      @keyframes floatUp { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }
      @keyframes pulseDot { 0%{box-shadow:0 0 0 0 rgba(16,185,129,.5);} 70%{box-shadow:0 0 0 8px rgba(16,185,129,0);} 100%{box-shadow:0 0 0 0 rgba(16,185,129,0);} }
      .anim-fadeup { animation: fadeUp .35s ease-out both; }
      .anim-pop { animation: pop .4s cubic-bezier(.34,1.56,.64,1) both; }
      .anim-pulse-warn { animation: pulseWarn .7s ease-in-out infinite; }
      .anim-float { animation: floatUp 2s ease-in-out infinite; }
      .shimmer-text { background: linear-gradient(90deg,#6366F1 0%,#EC4899 25%,#F59E0B 50%,#EC4899 75%,#6366F1 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: shimmer 4s linear infinite; }
      canvas { touch-action: none; cursor: crosshair; display: block; }
      .scroll-thin::-webkit-scrollbar { width: 6px; height: 6px; }
      .scroll-thin::-webkit-scrollbar-thumb { background: rgba(99,102,241,.3); border-radius: 999px; }
      .scroll-thin::-webkit-scrollbar-track { background: transparent; }
      .confetti-piece { position: absolute; width: 10px; height: 14px; top: -20px; animation: confetti 2.5s linear forwards; pointer-events: none; }
      .live-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#10B981; animation: pulseDot 1.6s infinite; }
      .loading-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; z-index: 9999; }
      .loading-screen .logo { width: 64px; height: 64px; border-radius: 18px; background: linear-gradient(135deg,#6366F1,#EC4899); display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 8px 24px rgba(99,102,241,.35); animation: pulseWarn 1s infinite; }
      .loading-screen .label { font-weight: 600; font-size: 14px; color: #64748b; }
    </style>
  </head>
  <body class="font-sans">
    <div id="root">
      <div class="loading-screen">
        <div class="logo">🎨</div>
        <div class="label">Cargando Rezopaint…</div>
      </div>
    </div>

    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useRef, useMemo, useCallback } = React;

      const initialAvatar = (n) => ((n || "").trim()[0] || "?").toUpperCase();
      const formatTime = (s) => {
        s = Math.max(0, Math.floor(s || 0));
        return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
      };
      const DIFFICULTY_META = {
        facil:   { label: "Fácil",   color: "#10B981", time: 90, points: 10 },
        medio:   { label: "Medio",   color: "#F59E0B", time: 80, points: 15 },
        dificil: { label: "Difícil", color: "#EF4444", time: 70, points: 25 },
      };
      const DRAW_COLORS = [
        "#000000","#666666","#A3A3A3","#FFFFFF",
        "#7F1D1D","#EF4444","#F97316","#F59E0B",
        "#FBBF24","#84CC16","#10B981","#06B6D4",
        "#3B82F6","#6366F1","#8B5CF6","#EC4899",
        "#7C2D12","#A16207","#365314","#831843",
      ];
      const BRUSH_SIZES = [3, 8, 16, 28];
      const VCANVAS_W = 1000, VCANVAS_H = 600;
      const CONFETTI_COLORS = ["#EF4444","#F59E0B","#10B981","#06B6D4","#6366F1","#EC4899"];
      const MOVE_THROTTLE = 25;

      const socket = io({ autoConnect: true, reconnection: true, reconnectionDelay: 800, reconnectionAttempts: 6 });

      // ============ CONFETTI ============
      function ConfettiBurst({ count = 28 }) {
        const pieces = useMemo(() => Array.from({ length: count }, (_, i) => ({
          id: i, left: Math.random() * 100, delay: Math.random() * 0.6,
          color: CONFETTI_COLORS[i % CONFETTI_COLORS.length], rotate: Math.random() * 360,
        })), [count]);
        return (
          <div className="absolute inset-0 pointer-events-none overflow-hidden">
            {pieces.map((p) => (
              <div key={p.id} className="confetti-piece" style={{ left: `${p.left}%`, background: p.color, animationDelay: `${p.delay}s`, transform: `rotate(${p.rotate}deg)` }} />
            ))}
          </div>
        );
      }

      // ============ PLAYER STRIP ============
      function PlayerStrip({ players, drawerId, correctGuessers, youId }) {
        const guessedSet = new Set(correctGuessers || []);
        const sorted = [...players].sort((a, b) => b.score - a.score);
        return (
          <div className="px-3 pb-2">
            <div className="flex gap-1.5 overflow-x-auto scroll-thin">
              {sorted.map((p) => {
                const isDrawer = p.id === drawerId;
                const guessed = guessedSet.has(p.id);
                const isYou = p.id === youId;
                return (
                  <div key={p.id} className={`shrink-0 r-card-soft px-2 py-1.5 flex items-center gap-1.5 ${guessed ? "anim-pop" : ""}`} style={{ border: isDrawer ? `2px solid ${p.color}` : isYou ? "2px solid #6366F1" : "2px solid transparent", background: guessed ? "linear-gradient(135deg,#DCFCE7,#BBF7D0)" : "#fff", minWidth: 0 }}>
                    <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold shrink-0 relative" style={{ background: p.color }}>
                      {initialAvatar(p.name)}
                      {isDrawer && <div className="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-white flex items-center justify-center text-[9px] shadow">✏️</div>}
                      {guessed && !isDrawer && <div className="absolute -top-1 -right-1 w-4 h-4 rounded-full flex items-center justify-center text-[9px] shadow" style={{ background: "#10B981", color: "#fff" }}>✓</div>}
                    </div>
                    <div className="min-w-0">
                      <div className="text-[11px] font-bold leading-none truncate flex items-center gap-1" style={{ maxWidth: "70px" }}>
                        {p.name}{isYou && <span className="text-[9px] text-indigo-500">(vos)</span>}
                      </div>
                      <div className="text-[10px] text-slate-500 font-semibold leading-none mt-0.5">{p.score}p</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      // ============ PRE-ROUND OVERLAY ============
      function PreRoundOverlay({ drawer, isYouDrawer, myWord, letterCount }) {
        const [count, setCount] = useState(3);
        useEffect(() => {
          setCount(3);
          const id = setInterval(() => setCount((c) => Math.max(0, c - 1)), 1000);
          return () => clearInterval(id);
        }, [drawer?.id]);
        return (
          <div className="absolute inset-0 z-40 flex items-center justify-center backdrop-blur-md bg-slate-900/80 anim-fadeup">
            <div className="text-center px-6 max-w-sm">
              {isYouDrawer ? (
                <>
                  <div className="text-xs uppercase tracking-wider font-bold text-slate-300 mb-2">¡Te toca dibujar!</div>
                  <div className="text-2xl font-bold mb-1 anim-pop" style={{ background: "linear-gradient(135deg,#FCD34D,#F472B6,#A78BFA)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Tu palabra</div>
                  <div className="text-4xl font-bold mb-4 anim-pop" style={{ color: "#fff", letterSpacing: "-0.01em", wordBreak: "break-word" }}>{(myWord || "...").toUpperCase()}</div>
                  <div className="text-sm text-slate-300 font-medium">Empezás en {count}…</div>
                </>
              ) : (
                <>
                  <div className="flex justify-center mb-3">
                    <div className="w-16 h-16 rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-xl anim-pop" style={{ background: drawer?.color || "#6366F1" }}>{initialAvatar(drawer?.name)}</div>
                  </div>
                  <div className="text-xs uppercase tracking-wider font-bold text-slate-300 mb-1">Está dibujando</div>
                  <div className="text-3xl font-bold mb-2 anim-pop" style={{ color: drawer?.color || "#fff" }}>{drawer?.name || "..."}</div>
                  <div className="text-sm text-slate-300 font-medium mb-3">{letterCount} letras · prepara tus dedos</div>
                  <div className="inline-block text-4xl font-bold" style={{ color: "#FCD34D" }}>{count}</div>
                </>
              )}
            </div>
          </div>
        );
      }

      // ============ ROUND END OVERLAY ============
      function RoundEndOverlay({ result, players, drawerId }) {
        if (!result) return null;
        const { type, word, pointsAwarded, correctCount } = result;
        const drawer = players.find((p) => p.id === drawerId);
        const hasWinner = (correctCount || 0) > 0;
        const config = hasWinner
          ? { emoji: "🎉", title: correctCount === 1 ? "¡Adivinaron!" : `${correctCount} adivinaron`, bg: "linear-gradient(135deg,#DCFCE7,#BBF7D0)", color: "#15803D" }
          : type === "skip" ? { emoji: "⏭", title: "Palabra saltada", bg: "linear-gradient(135deg,#EDE9FE,#DDD6FE)", color: "#6D28D9" }
          : type === "drawerLeft" ? { emoji: "👋", title: "Dibujante salió", bg: "linear-gradient(135deg,#FEE2E2,#FECACA)", color: "#B91C1C" }
          : { emoji: "⏰", title: "¡Nadie adivinó!", bg: "linear-gradient(135deg,#FEF3C7,#FDE68A)", color: "#A16207" };
        return (
          <div className="absolute inset-0 z-40 flex items-center justify-center backdrop-blur-md bg-slate-900/70 p-4 anim-fadeup">
            <div className="r-card w-full max-w-sm p-5 text-center anim-pop relative overflow-hidden" style={{ background: config.bg }}>
              {hasWinner && <ConfettiBurst count={20} />}
              <div className="text-5xl mb-2 relative">{config.emoji}</div>
              <div className="font-bold text-2xl mb-1 relative" style={{ color: config.color }}>{config.title}</div>
              <div className="text-sm font-medium mt-2 relative" style={{ color: config.color }}>La palabra era</div>
              <div className="text-3xl font-bold mt-1 mb-3 relative" style={{ color: config.color, letterSpacing: "-0.01em" }}>{(word || "").toUpperCase()}</div>
              {pointsAwarded && Object.keys(pointsAwarded).length > 0 && (
                <div className="space-y-1.5 mt-3 text-left relative">
                  {Object.entries(pointsAwarded).map(([pid, mark]) => {
                    const p = players.find((pl) => pl.id === pid);
                    if (!p) return null;
                    return (
                      <div key={pid} className="flex items-center gap-2 px-2 py-1.5 rounded-lg bg-white/60">
                        <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold" style={{ background: p.color }}>{initialAvatar(p.name)}</div>
                        <span className="font-bold text-sm flex-1">{p.name}</span>
                        <span className="text-xs">{mark}</span>
                        <span className="font-bold text-sm px-2 py-0.5 rounded-lg" style={{ background: "#fff", color: "#15803D" }}>{p.score}p</span>
                      </div>
                    );
                  })}
                </div>
              )}
              <div className="text-xs text-slate-500 font-medium mt-4 relative">Próxima ronda en unos segundos…</div>
            </div>
          </div>
        );
      }

      // ============ GAME OVER (privadas) ============
      function GameOverOverlay({ players, isHost, onPlayAgain, onLeave }) {
        const sorted = [...players].sort((a, b) => b.score - a.score);
        const champion = sorted[0];
        if (!champion) return null;
        return (
          <div className="absolute inset-0 z-40 flex items-center justify-center backdrop-blur-md bg-slate-900/85 p-4 anim-fadeup overflow-y-auto">
            <ConfettiBurst count={40} />
            <div className="r-card w-full max-w-sm my-4 p-5 relative anim-pop">
              <div className="text-center mb-4">
                <div className="text-6xl mb-2">🏆</div>
                <div className="text-3xl font-bold mb-1" style={{ background: "linear-gradient(135deg,#F59E0B,#EF4444,#EC4899)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>¡{champion.name} GANÓ!</div>
                <div className="text-sm text-slate-500 font-medium">con {champion.score} puntos</div>
              </div>
              <div className="space-y-2 mb-4">
                {sorted.map((p, i) => {
                  const medal = ["🥇", "🥈", "🥉"][i] || `#${i + 1}`;
                  return (
                    <div key={p.id} className="flex items-center gap-2.5 p-2.5 rounded-xl anim-fadeup" style={{ background: i === 0 ? "linear-gradient(135deg,#FEF3C7,#FDE68A)" : i === 1 ? "linear-gradient(135deg,#F1F5F9,#E2E8F0)" : i === 2 ? "linear-gradient(135deg,#FFEDD5,#FED7AA)" : "#F8FAFC", animationDelay: `${i * 80}ms` }}>
                      <div className="text-2xl w-8 text-center">{medal}</div>
                      <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shadow-md" style={{ background: p.color }}>{initialAvatar(p.name)}</div>
                      <div className="flex-1 font-bold text-sm">{p.name}</div>
                      <div className="font-bold text-lg px-3 py-1 rounded-lg text-white" style={{ background: p.color }}>{p.score}</div>
                    </div>
                  );
                })}
              </div>
              {isHost ? (
                <button onClick={onPlayAgain} className="r-btn w-full py-3 rounded-2xl text-white font-bold" style={{ background: "linear-gradient(135deg,#6366F1,#EC4899)", boxShadow: "0 8px 24px rgba(99,102,241,.35)" }}>🔁 OTRA PARTIDA</button>
              ) : (
                <div className="text-center text-xs text-slate-500 font-medium py-2">Esperando que el host comience otra…</div>
              )}
              <button onClick={onLeave} className="r-btn w-full py-2.5 rounded-2xl mt-2 font-bold text-slate-500 bg-white border border-slate-200">Salir</button>
            </div>
          </div>
        );
      }

      // ============ DRAWING CANVAS (con stroke replay) ============
      function DrawingCanvas({ isDrawer, color, brushSize, isErasing, paused }) {
        const canvasRef = useRef(null);
        const strokesRef = useRef([]);
        const currentStrokeRef = useRef(null);
        const isDrawingRef = useRef(false);
        const lastEmitRef = useRef(0);

        const fillBg = useCallback(() => {
          const c = canvasRef.current; if (!c) return;
          const ctx = c.getContext("2d");
          ctx.save(); ctx.setTransform(1,0,0,1,0,0);
          ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, c.width, c.height);
          ctx.restore();
        }, []);
        const drawSeg = useCallback((ctx, fx, fy, tx, ty, c, s) => {
          ctx.strokeStyle = c; ctx.lineWidth = s; ctx.lineCap = "round"; ctx.lineJoin = "round";
          ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(tx, ty); ctx.stroke();
        }, []);
        const drawDot = useCallback((ctx, x, y, c, s) => {
          ctx.fillStyle = c; ctx.beginPath(); ctx.arc(x, y, s/2, 0, Math.PI*2); ctx.fill();
        }, []);
        const redrawAll = useCallback(() => {
          fillBg();
          const c = canvasRef.current; if (!c) return;
          const ctx = c.getContext("2d");
          for (const s of strokesRef.current) {
            const col = s.isErasing ? "#FFFFFF" : s.color;
            if (s.points.length === 1) drawDot(ctx, s.points[0].x, s.points[0].y, col, s.size);
            else for (let i = 1; i < s.points.length; i++) drawSeg(ctx, s.points[i-1].x, s.points[i-1].y, s.points[i].x, s.points[i].y, col, s.size);
          }
        }, [drawDot, drawSeg, fillBg]);

        useEffect(() => {
          const c = canvasRef.current; if (!c) return;
          c.width = VCANVAS_W; c.height = VCANVAS_H; fillBg();
        }, [fillBg]);

        useEffect(() => {
          const onStart = (d) => {
            const stroke = { color: d.color, size: d.size, isErasing: d.isErasing, points: [{ x: d.x, y: d.y }] };
            currentStrokeRef.current = stroke; strokesRef.current.push(stroke);
            const c = canvasRef.current; if (c) { const ctx = c.getContext("2d"); drawDot(ctx, d.x, d.y, d.isErasing ? "#FFFFFF" : d.color, d.size); }
          };
          const onMove = (d) => {
            const s = currentStrokeRef.current; if (!s) return;
            const prev = s.points[s.points.length-1]; s.points.push({ x: d.x, y: d.y });
            const c = canvasRef.current; if (c) { const ctx = c.getContext("2d"); drawSeg(ctx, prev.x, prev.y, d.x, d.y, s.isErasing ? "#FFFFFF" : s.color, s.size); }
          };
          const onEnd = () => { currentStrokeRef.current = null; };
          const onUndo = () => { strokesRef.current.pop(); redrawAll(); };
          const onClear = () => { strokesRef.current = []; currentStrokeRef.current = null; fillBg(); };
          const onReplay = ({ strokes }) => {
            strokesRef.current = strokes.map((s) => ({ ...s, points: [...s.points] }));
            currentStrokeRef.current = null; redrawAll();
          };
          socket.on("draw:start", onStart);
          socket.on("draw:move", onMove);
          socket.on("draw:end", onEnd);
          socket.on("draw:undo", onUndo);
          socket.on("draw:clear", onClear);
          socket.on("game:strokesReplay", onReplay);
          return () => {
            socket.off("draw:start", onStart);
            socket.off("draw:move", onMove);
            socket.off("draw:end", onEnd);
            socket.off("draw:undo", onUndo);
            socket.off("draw:clear", onClear);
            socket.off("game:strokesReplay", onReplay);
          };
        }, [drawDot, drawSeg, fillBg, redrawAll]);

        const getCoords = (e) => {
          const c = canvasRef.current; const r = c.getBoundingClientRect();
          return { x: (e.clientX - r.left) * (VCANVAS_W / r.width), y: (e.clientY - r.top) * (VCANVAS_H / r.height) };
        };

        const onDown = (e) => {
          if (!isDrawer || paused) return;
          e.preventDefault();
          const c = canvasRef.current; if (!c) return;
          isDrawingRef.current = true; c.setPointerCapture?.(e.pointerId);
          const { x, y } = getCoords(e);
          const stroke = { color, size: brushSize, isErasing, points: [{ x, y }] };
          currentStrokeRef.current = stroke; strokesRef.current.push(stroke);
          const ctx = c.getContext("2d");
          drawDot(ctx, x, y, isErasing ? "#FFFFFF" : color, brushSize);
          socket.emit("draw:start", { x, y, color, size: brushSize, isErasing });
          lastEmitRef.current = Date.now();
        };
        const onMove = (e) => {
          if (!isDrawingRef.current || !currentStrokeRef.current) return;
          e.preventDefault();
          const { x, y } = getCoords(e);
          const s = currentStrokeRef.current;
          const prev = s.points[s.points.length-1]; s.points.push({ x, y });
          const c = canvasRef.current; if (c) { const ctx = c.getContext("2d"); drawSeg(ctx, prev.x, prev.y, x, y, isErasing ? "#FFFFFF" : color, brushSize); }
          const now = Date.now();
          if (now - lastEmitRef.current >= MOVE_THROTTLE) { socket.emit("draw:move", { x, y }); lastEmitRef.current = now; }
        };
        const onUp = () => {
          if (!isDrawingRef.current) return;
          isDrawingRef.current = false;
          if (currentStrokeRef.current) {
            const last = currentStrokeRef.current.points[currentStrokeRef.current.points.length-1];
            if (last) socket.emit("draw:move", { x: last.x, y: last.y });
            socket.emit("draw:end"); currentStrokeRef.current = null;
          }
        };

        useEffect(() => {
          window.__rezopaintUndo = () => { if (!isDrawer) return; strokesRef.current.pop(); redrawAll(); socket.emit("draw:undo"); };
          window.__rezopaintClear = () => { if (!isDrawer) return; strokesRef.current = []; fillBg(); socket.emit("draw:clear"); };
          return () => { delete window.__rezopaintUndo; delete window.__rezopaintClear; };
        }, [isDrawer, redrawAll, fillBg]);

        return (
          <div className="r-card relative overflow-hidden w-full" style={{ aspectRatio: "5 / 3", maxHeight: "min(40vh, 360px)" }}>
            <canvas ref={canvasRef} onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp} onPointerLeave={onUp} className="block w-full h-full" style={{ touchAction: "none", cursor: isDrawer ? "crosshair" : "default", opacity: paused ? 0.5 : 1 }} />
            {!isDrawer && (
              <div className="absolute top-2 left-2 px-2 py-1 rounded-lg bg-white/80 backdrop-blur text-[10px] font-bold text-slate-500 shadow-sm pointer-events-none">👀 Mirando</div>
            )}
          </div>
        );
      }

      // ============ TOOLBAR ============
      function Toolbar({ isDrawer, color, setColor, brushSize, setBrushSize, isErasing, setIsErasing }) {
        const dis = !isDrawer;
        const undo = () => window.__rezopaintUndo?.();
        const clear = () => window.__rezopaintClear?.();
        const skip = () => { if (!isDrawer) return; if (confirm("¿Saltar esta palabra? Nadie ganará puntos.")) socket.emit("game:skip"); };
        return (
          <div className="px-3 py-2">
            <div className="r-card-soft p-2 space-y-1.5" style={{ opacity: dis ? 0.6 : 1 }}>
              <div className="flex gap-1 overflow-x-auto scroll-thin pb-0.5">
                {DRAW_COLORS.map((c) => {
                  const sel = !isErasing && color === c;
                  return <button key={c} onClick={() => { if (dis) return; setColor(c); setIsErasing(false); }} disabled={dis} className="shrink-0 rounded-md transition-all" style={{ width: "22px", height: "22px", background: c, border: c === "#FFFFFF" ? "1.5px solid #CBD5E1" : `1.5px solid ${c}`, outline: sel ? "2.5px solid #6366F1" : "none", outlineOffset: "1.5px", transform: sel ? "scale(1.15)" : "scale(1)", cursor: dis ? "not-allowed" : "pointer" }} />;
                })}
              </div>
              <div className="flex items-center gap-1.5">
                <div className="flex gap-1">
                  {BRUSH_SIZES.map((s) => {
                    const sel = brushSize === s;
                    return <button key={s} onClick={() => !dis && setBrushSize(s)} disabled={dis} className="r-btn rounded-lg flex items-center justify-center transition-all" style={{ width: "30px", height: "30px", background: sel ? "#EEF2FF" : "#F8FAFC", border: `1.5px solid ${sel ? "#6366F1" : "#E2E8F0"}` }}>
                      <div style={{ width: `${Math.min(s,18)}px`, height: `${Math.min(s,18)}px`, borderRadius: "50%", background: sel ? "#6366F1" : "#64748B" }} />
                    </button>;
                  })}
                </div>
                <button onClick={() => !dis && setIsErasing(!isErasing)} disabled={dis} className="r-btn px-2.5 h-[30px] rounded-lg text-xs font-bold transition-all" style={{ background: isErasing ? "#FEF3C7" : "#F8FAFC", border: `1.5px solid ${isErasing ? "#F59E0B" : "#E2E8F0"}`, color: isErasing ? "#B45309" : "#64748B" }}>🧽 Borra</button>
                <div className="flex-1" />
                <button onClick={undo} disabled={dis} className="r-btn h-[30px] w-[34px] rounded-lg text-base font-bold bg-white border border-slate-200 text-slate-700">↶</button>
                <button onClick={clear} disabled={dis} className="r-btn h-[30px] w-[34px] rounded-lg text-sm font-bold bg-white border border-slate-200 text-slate-700">🗑</button>
                <button onClick={skip} disabled={dis} className="r-btn h-[30px] px-2.5 rounded-lg text-xs font-bold text-white" style={{ background: dis ? "#CBD5E1" : "linear-gradient(135deg,#8B5CF6,#EC4899)" }}>Saltar</button>
              </div>
            </div>
          </div>
        );
      }

      // ============ CHAT ============
      function ChatMessage({ m }) {
        if (m.type === "system") return <div className="text-center text-[10px] text-slate-400 font-semibold py-1 anim-fadeup">{m.text}</div>;
        if (m.type === "system-success") return <div className="text-center text-xs font-bold py-1.5 px-2 rounded-lg anim-pop" style={{ background: "linear-gradient(135deg,#DCFCE7,#BBF7D0)", color: "#15803D" }}>{m.text}</div>;
        if (m.type === "system-fail") return <div className="text-center text-xs font-bold py-1.5 px-2 rounded-lg anim-fadeup" style={{ background: "#FEF3C7", color: "#A16207" }}>{m.text}</div>;
        if (m.type === "system-close") return <div className="text-center text-[11px] font-bold py-1 px-2 rounded-lg anim-fadeup" style={{ background: "#FFEDD5", color: "#C2410C" }}>{m.text}</div>;
        if (m.type === "guess-correct") return (
          <div className="flex items-center gap-1.5 px-2 py-1 rounded-lg anim-pop" style={{ background: "linear-gradient(135deg,#DCFCE7,#BBF7D0)" }}>
            <div className="w-5 h-5 rounded-full flex items-center justify-center text-white text-[10px] font-bold shrink-0" style={{ background: m.playerColor }}>{initialAvatar(m.playerName)}</div>
            <span className="text-xs font-bold" style={{ color: "#15803D" }}>{m.playerName} {m.text}</span>
          </div>
        );
        const close = m.type === "guess-close";
        return (
          <div className="flex items-start gap-1.5 anim-fadeup">
            <div className="w-5 h-5 rounded-full flex items-center justify-center text-white text-[10px] font-bold shrink-0 mt-0.5" style={{ background: m.playerColor }}>{initialAvatar(m.playerName)}</div>
            <div className="flex-1 min-w-0">
              <span className="text-[11px] font-bold mr-1.5" style={{ color: m.playerColor }}>{m.playerName}:</span>
              <span className="text-xs" style={{ color: close ? "#C2410C" : "#475569", fontWeight: close ? 600 : 500 }}>{m.text}{close && " 🔥"}</span>
            </div>
          </div>
        );
      }

      function ChatPanel({ chat, you, room }) {
        const [text, setText] = useState("");
        const scrollRef = useRef(null);
        const isDrawer = room.drawerId === you.id;
        const hasGuessed = (room.correctGuessers || []).includes(you.id);
        const stage = room.stage;
        const dis = isDrawer || (hasGuessed && stage === "drawing");
        useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [chat]);
        const send = () => { const t = text.trim(); if (!t || dis) return; socket.emit("chat:message", { text: t }); setText(""); };
        const onKey = (e) => { if (e.key === "Enter") { e.preventDefault(); send(); } };
        let ph = stage === "drawing" ? "Escribe tu adivinanza…" : "Escribe un mensaje…";
        if (isDrawer) ph = "Estás dibujando, no puedes chatear";
        else if (hasGuessed && stage === "drawing") ph = "Ya adivinaste 🎉";
        return (
          <div className="flex-1 px-3 pb-3 flex flex-col min-h-0">
            <div className="r-card flex-1 flex flex-col overflow-hidden">
              <div className="px-3 py-1.5 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <div className="flex items-center gap-1.5"><span className="text-sm">💬</span><span className="text-xs font-bold text-slate-600">{stage === "drawing" ? "Adivinanzas" : "Chat"}</span></div>
                <span className="text-[10px] text-slate-400 font-medium">{chat.filter((m) => !m.type?.startsWith("system")).length} msgs</span>
              </div>
              <div ref={scrollRef} className="flex-1 overflow-y-auto scroll-thin px-3 py-2 space-y-1" style={{ minHeight: "100px" }}>
                {chat.length === 0 && <div className="text-center text-xs text-slate-400 py-4 font-medium">Sé el primero en escribir 🎯</div>}
                {chat.map((m) => <ChatMessage key={m.id} m={m} />)}
              </div>
              <div className="px-2 py-2 flex gap-1.5 items-center border-t border-slate-100 bg-white">
                <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold shrink-0 shadow-sm" style={{ background: you.color || "#94A3B8" }}>{initialAvatar(you.name)}</div>
                <input value={text} onChange={(e) => setText(e.target.value.slice(0,40))} onKeyDown={onKey} disabled={dis} placeholder={ph} className="r-input flex-1 px-3 py-2 rounded-xl border border-slate-200 bg-slate-50 text-sm" style={{ opacity: dis ? 0.5 : 1 }} maxLength={40} autoCorrect="off" autoComplete="off" autoCapitalize="off" />
                <button onClick={send} disabled={dis || !text.trim()} className="r-btn w-9 h-9 rounded-xl text-white font-bold shrink-0 shadow-md" style={{ background: dis || !text.trim() ? "#CBD5E1" : "linear-gradient(135deg,#6366F1,#EC4899)", cursor: dis || !text.trim() ? "not-allowed" : "pointer" }}>➤</button>
              </div>
            </div>
          </div>
        );
      }

      // ============ HOME SCREEN ============
      function HomeScreen({ connected, error, onQuickPlay, onCreate, onJoin, stats, busy }) {
        const [mode, setMode] = useState("home");
        const [name, setName] = useState(localStorage.getItem("rezopaint:name") || "");
        const [code, setCode] = useState("");
        const [difficulty, setDifficulty] = useState("medio");
        const [cycles, setCycles] = useState(2);
        useEffect(() => { if (name) localStorage.setItem("rezopaint:name", name); }, [name]);
        useEffect(() => {
          const params = new URLSearchParams(window.location.search);
          const fromUrl = (params.get("room") || window.location.hash.replace("#","")).toUpperCase().trim();
          if (fromUrl && fromUrl.length === 5) { setCode(fromUrl); setMode("join"); }
        }, []);
        const tn = name.trim();
        const canQ = !!tn && connected && !busy;
        const canC = !!tn && connected && !busy;
        const canJ = !!tn && code.trim().length === 5 && connected && !busy;

        return (
          <div className="flex-1 overflow-y-auto p-4 scroll-thin">
            <div className="max-w-md mx-auto space-y-4 anim-fadeup">
              <div className="text-center pt-2 pb-1">
                <div className="inline-block text-5xl font-bold leading-none mb-2 shimmer-text" style={{ letterSpacing: "-0.02em" }}>Rezopaint</div>
                <p className="text-sm text-slate-600 font-medium">Dibuja, adivina por chat, gana online</p>
                {stats && stats.players > 0 && (
                  <div className="inline-flex items-center gap-2 mt-3 px-3 py-1 rounded-full bg-white/80 backdrop-blur shadow-sm anim-pop">
                    <span className="live-dot"></span>
                    <span className="text-xs font-bold text-slate-700">{stats.players} jugando ahora</span>
                    {stats.publicRooms > 0 && <span className="text-[10px] text-slate-500 font-medium">· {stats.publicRooms} sala{stats.publicRooms > 1 ? "s" : ""}</span>}
                  </div>
                )}
              </div>
              {!connected && <div className="r-card-soft p-3 text-center text-sm font-medium" style={{ background: "#FEF3C7", color: "#A16207" }}>🔌 Conectando con el servidor… (puede tardar 30s si está dormido)</div>}
              {error && <div className="r-card-soft p-3 text-center text-sm font-bold anim-pop" style={{ background: "#FEE2E2", color: "#B91C1C" }}>⚠️ {error}</div>}

              <div className="r-card p-4">
                <div className="font-bold text-slate-800 mb-3">👤 Tu nombre</div>
                <div className="flex items-center gap-2">
                  <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shrink-0 shadow-sm" style={{ background: "linear-gradient(135deg,#6366F1,#EC4899)" }}>{initialAvatar(name || "?")}</div>
                  <input className="r-input flex-1 px-3 py-2 rounded-xl border border-slate-200 bg-slate-50 text-sm" placeholder="Cómo te llamás" value={name} onChange={(e) => setName(e.target.value.slice(0,14))} maxLength={14} />
                </div>
              </div>

              {mode === "home" && (
                <div className="space-y-3">
                  <button onClick={() => canQ && onQuickPlay(tn)} disabled={!canQ} className="r-btn w-full py-5 rounded-2xl text-xl text-white font-bold relative overflow-hidden" style={{ background: canQ ? "linear-gradient(135deg,#F59E0B,#EF4444,#EC4899)" : "#CBD5E1", boxShadow: canQ ? "0 12px 32px rgba(239,68,68,.4)" : "none" }}>
                    <div className="flex flex-col items-center gap-0.5">
                      <span className="text-2xl">🚀 QUICK PLAY</span>
                      <span className="text-[11px] font-medium opacity-90">Te metemos en una sala pública</span>
                    </div>
                  </button>
                  <div className="flex items-center gap-2 py-1">
                    <div className="flex-1 h-px bg-slate-200"></div>
                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">o jugá con amigos</span>
                    <div className="flex-1 h-px bg-slate-200"></div>
                  </div>
                  <button onClick={() => setMode("create")} disabled={!tn} className="r-btn w-full py-3.5 rounded-2xl text-white font-bold" style={{ background: tn ? "linear-gradient(135deg,#6366F1,#8B5CF6)" : "#CBD5E1", boxShadow: tn ? "0 6px 18px rgba(99,102,241,.3)" : "none" }}>🎨 CREAR SALA PRIVADA</button>
                  <button onClick={() => setMode("join")} disabled={!tn} className="r-btn w-full py-3 rounded-2xl font-bold border-2 transition-all" style={{ background: "#fff", borderColor: tn ? "#6366F1" : "#E2E8F0", color: tn ? "#4338CA" : "#94A3B8" }}>🔑 UNIRME CON CÓDIGO</button>
                </div>
              )}

              {mode === "create" && (
                <>
                  <div className="r-card p-4">
                    <div className="font-bold text-slate-800 mb-3">⚡ Dificultad</div>
                    <div className="grid grid-cols-3 gap-2">
                      {Object.entries(DIFFICULTY_META).map(([key, m]) => {
                        const sel = difficulty === key;
                        return <button key={key} onClick={() => setDifficulty(key)} className="r-btn py-3 rounded-xl text-sm transition-all" style={{ background: sel ? m.color : "#F8FAFC", color: sel ? "#fff" : "#64748B", border: `2px solid ${sel ? m.color : "#E2E8F0"}`, boxShadow: sel ? `0 4px 12px ${m.color}40` : "none", transform: sel ? "translateY(-2px)" : "none" }}><div className="font-bold">{m.label}</div><div className="text-[10px] opacity-90 mt-0.5">{m.time}s</div></button>;
                      })}
                    </div>
                  </div>
                  <div className="r-card p-4">
                    <div className="font-bold text-slate-800 mb-3">🔁 Cada uno dibuja</div>
                    <div className="grid grid-cols-3 gap-2">
                      {[1,2,3].map((c) => {
                        const sel = cycles === c;
                        return <button key={c} onClick={() => setCycles(c)} className="r-btn py-2.5 rounded-xl text-sm" style={{ background: sel ? "#6366F1" : "#F8FAFC", color: sel ? "#fff" : "#64748B", border: `2px solid ${sel ? "#6366F1" : "#E2E8F0"}` }}><span className="font-bold">{c}</span><span className="opacity-90"> {c === 1 ? "vez" : "veces"}</span></button>;
                      })}
                    </div>
                  </div>
                  <button onClick={() => canC && onCreate(tn, { difficulty, cycles })} disabled={!canC} className="r-btn w-full py-4 rounded-2xl text-lg text-white font-bold" style={{ background: canC ? "linear-gradient(135deg,#6366F1,#EC4899)" : "#CBD5E1", boxShadow: canC ? "0 8px 24px rgba(99,102,241,.35)" : "none" }}>🚀 CREAR Y ENTRAR</button>
                  <button onClick={() => setMode("home")} className="r-btn w-full py-2.5 rounded-2xl font-bold text-slate-500 bg-white border border-slate-200">← Volver</button>
                </>
              )}

              {mode === "join" && (
                <>
                  <div className="r-card p-4">
                    <div className="font-bold text-slate-800 mb-3">🔑 Código de la sala</div>
                    <input className="r-input w-full px-4 py-4 rounded-2xl border-2 border-slate-200 bg-slate-50 text-center font-bold text-2xl tracking-[0.4em]" placeholder="ABCDE" value={code} onChange={(e) => setCode(e.target.value.toUpperCase().replace(/[^A-Z2-9]/g,"").slice(0,5))} maxLength={5} autoCapitalize="characters" autoCorrect="off" autoComplete="off" />
                    <div className="text-[11px] text-slate-500 mt-2 font-medium text-center">Pídele el código a quien creó la sala</div>
                  </div>
                  <button onClick={() => canJ && onJoin(code.toUpperCase().trim(), tn)} disabled={!canJ} className="r-btn w-full py-4 rounded-2xl text-lg text-white font-bold" style={{ background: canJ ? "linear-gradient(135deg,#10B981,#06B6D4)" : "#CBD5E1", boxShadow: canJ ? "0 8px 24px rgba(16,185,129,.35)" : "none" }}>🎯 UNIRME</button>
                  <button onClick={() => setMode("home")} className="r-btn w-full py-2.5 rounded-2xl font-bold text-slate-500 bg-white border border-slate-200">← Volver</button>
                </>
              )}

              <div className="text-center text-[11px] text-slate-400 pb-3 font-medium">Multijugador en tiempo real · Hasta 15 por sala</div>
            </div>
          </div>
        );
      }

      // ============ WAITING SCREEN (públicas con < 2 jugadores) ============
      function WaitingScreen({ room, you, chat, onLeave }) {
        const [copied, setCopied] = useState(false);
        const shareUrl = `${window.location.origin}/?room=${room.code}`;
        const copyCode = async () => {
          try { await navigator.clipboard.writeText(room.code); setCopied(true); setTimeout(() => setCopied(false), 1500); }
          catch (e) { const ta = document.createElement("textarea"); ta.value = room.code; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); } catch (e2) {} document.body.removeChild(ta); setCopied(true); setTimeout(() => setCopied(false), 1500); }
        };
        const shareWA = () => { window.open(`https://wa.me/?text=${encodeURIComponent(`🎨 Vení a jugar Rezopaint!\nCódigo: ${room.code}\nLink: ${shareUrl}`)}`, "_blank"); };
        return (
          <div className="flex-1 overflow-y-auto p-4 scroll-thin">
            <div className="max-w-md mx-auto space-y-4 anim-fadeup">
              <div className="r-card p-5 text-center" style={{ background: "linear-gradient(135deg, rgba(245,158,11,.1), rgba(239,68,68,.1))" }}>
                <div className="text-6xl mb-2 anim-float">⏳</div>
                <div className="text-2xl font-bold mb-1" style={{ color: "#A16207" }}>Esperando jugadores</div>
                <div className="text-sm text-slate-600 font-medium">Necesitamos al menos 2 personas para empezar.<br/>La partida arranca sola.</div>
              </div>
              <div className="r-card p-4 text-center">
                <div className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Invitá amigos · Código</div>
                <div className="text-4xl font-bold tracking-[0.25em] mb-3" style={{ background: "linear-gradient(135deg,#6366F1,#EC4899)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>{room.code}</div>
                <div className="flex gap-2 justify-center">
                  <button onClick={copyCode} className="r-btn px-3 py-1.5 rounded-xl text-xs font-bold bg-white border border-slate-200 text-slate-700 shadow-sm">{copied ? "✓ Copiado" : "📋 Copiar"}</button>
                  <button onClick={shareWA} className="r-btn px-3 py-1.5 rounded-xl text-xs font-bold text-white shadow-sm" style={{ background: "#25D366" }}>📱 WhatsApp</button>
                </div>
              </div>
              <div className="r-card p-4">
                <div className="font-bold text-slate-800 mb-3 flex items-center justify-between">
                  <span>👥 Jugadores ({room.players.length}/15)</span>
                  <span className="text-xs text-slate-400 font-medium">🌍 Pública</span>
                </div>
                <div className="space-y-2">
                  {room.players.map((p) => {
                    const isYou = p.id === you.id;
                    return <div key={p.id} className="flex items-center gap-2.5 p-2 rounded-xl" style={{ background: isYou ? "#EEF2FF" : "#F8FAFC", border: isYou ? "2px solid #6366F1" : "2px solid transparent" }}>
                      <div className="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold shrink-0 shadow-sm" style={{ background: p.color }}>{initialAvatar(p.name)}</div>
                      <div className="flex-1 min-w-0">
                        <div className="font-bold text-sm flex items-center gap-1.5">
                          <span className="truncate">{p.name}</span>
                          {isYou && <span className="text-[10px] text-indigo-500 font-bold">(vos)</span>}
                        </div>
                      </div>
                      {p.score > 0 && <div className="text-xs font-bold text-slate-500">{p.score}p</div>}
                    </div>;
                  })}
                </div>
              </div>
              {chat.length > 0 && (
                <div className="r-card p-3">
                  <div className="font-bold text-xs text-slate-500 uppercase tracking-wider mb-2">💬 Sala</div>
                  <div className="space-y-1 max-h-40 overflow-y-auto scroll-thin">
                    {chat.slice(-30).map((m) => <ChatMessage key={m.id} m={m} />)}
                  </div>
                </div>
              )}
              <button onClick={onLeave} className="r-btn w-full py-2.5 rounded-2xl font-bold text-slate-500 bg-white border border-slate-200">← Salir de la sala</button>
            </div>
          </div>
        );
      }

      // ============ LOBBY SCREEN (privadas) ============
      function LobbyScreen({ room, you, chat, onLeave }) {
        const [copied, setCopied] = useState(false);
        const isHost = room.hostId === you.id;
        const canStart = isHost && room.players.length >= 2;
        const shareUrl = `${window.location.origin}/?room=${room.code}`;
        const copyCode = async () => {
          try { await navigator.clipboard.writeText(room.code); setCopied(true); setTimeout(() => setCopied(false), 1500); }
          catch (e) { const ta = document.createElement("textarea"); ta.value = room.code; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); } catch (e2) {} document.body.removeChild(ta); setCopied(true); setTimeout(() => setCopied(false), 1500); }
        };
        const shareWA = () => { window.open(`https://wa.me/?text=${encodeURIComponent(`🎨 Vení a jugar Rezopaint!\nCódigo: ${room.code}\nLink: ${shareUrl}`)}`, "_blank"); };
        const setDif = (d) => { if (!isHost) return; socket.emit("room:settings", { difficulty: d }); };
        const setCyc = (c) => { if (!isHost) return; socket.emit("room:settings", { cycles: c }); };
        const start = () => { if (!canStart) return; socket.emit("game:start"); };
        return (
          <div className="flex-1 overflow-y-auto p-4 scroll-thin">
            <div className="max-w-md mx-auto space-y-4 anim-fadeup">
              <div className="r-card p-5 text-center relative overflow-hidden" style={{ background: "linear-gradient(135deg, rgba(99,102,241,.08), rgba(236,72,153,.08))" }}>
                <div className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">🔒 Sala privada</div>
                <div className="text-5xl font-bold tracking-[0.25em] mb-2" style={{ background: "linear-gradient(135deg,#6366F1,#EC4899)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>{room.code}</div>
                <div className="flex gap-2 justify-center">
                  <button onClick={copyCode} className="r-btn px-3 py-1.5 rounded-xl text-xs font-bold bg-white border border-slate-200 text-slate-700 shadow-sm">{copied ? "✓ Copiado" : "📋 Copiar código"}</button>
                  <button onClick={shareWA} className="r-btn px-3 py-1.5 rounded-xl text-xs font-bold text-white shadow-sm" style={{ background: "#25D366" }}>📱 WhatsApp</button>
                </div>
              </div>
              <div className="r-card p-4">
                <div className="flex items-center justify-between mb-3">
                  <div className="font-bold text-slate-800">👥 Jugadores ({room.players.length}/15)</div>
                  {room.players.length < 2 && <div className="text-xs text-slate-500 font-medium">Necesitas mín. 2</div>}
                </div>
                <div className="space-y-2">
                  {room.players.map((p) => {
                    const isYou = p.id === you.id;
                    const isH = p.id === room.hostId;
                    return <div key={p.id} className="flex items-center gap-2.5 p-2 rounded-xl" style={{ background: isYou ? "#EEF2FF" : "#F8FAFC", border: isYou ? "2px solid #6366F1" : "2px solid transparent" }}>
                      <div className="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold shrink-0 shadow-sm" style={{ background: p.color }}>{initialAvatar(p.name)}</div>
                      <div className="flex-1 min-w-0">
                        <div className="font-bold text-sm flex items-center gap-1.5">
                          <span className="truncate">{p.name}</span>
                          {isYou && <span className="text-[10px] text-indigo-500 font-bold">(vos)</span>}
                        </div>
                      </div>
                      {isH && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full" style={{ background: "#FEF3C7", color: "#A16207" }}>👑 HOST</span>}
                    </div>;
                  })}
                </div>
              </div>
              <div className="r-card p-4">
                <div className="font-bold text-slate-800 mb-3">⚙️ Configuración{!isHost && <span className="text-xs text-slate-400 font-medium ml-2">(solo el host puede cambiar)</span>}</div>
                <div className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Dificultad</div>
                <div className="grid grid-cols-3 gap-2 mb-3">
                  {Object.entries(DIFFICULTY_META).map(([key, m]) => {
                    const sel = room.settings.difficulty === key;
                    return <button key={key} onClick={() => setDif(key)} disabled={!isHost} className="r-btn py-2 rounded-xl text-sm transition-all" style={{ background: sel ? m.color : "#F8FAFC", color: sel ? "#fff" : "#64748B", border: `2px solid ${sel ? m.color : "#E2E8F0"}`, opacity: isHost ? 1 : 0.6 }}><div className="font-bold text-xs">{m.label}</div><div className="text-[10px] opacity-90">{m.time}s</div></button>;
                  })}
                </div>
                <div className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Rondas por jugador</div>
                <div className="grid grid-cols-3 gap-2">
                  {[1,2,3].map((c) => {
                    const sel = room.settings.cycles === c;
                    return <button key={c} onClick={() => setCyc(c)} disabled={!isHost} className="r-btn py-2 rounded-xl text-sm" style={{ background: sel ? "#6366F1" : "#F8FAFC", color: sel ? "#fff" : "#64748B", border: `2px solid ${sel ? "#6366F1" : "#E2E8F0"}`, opacity: isHost ? 1 : 0.6 }}><span className="font-bold">{c}</span><span className="opacity-90"> {c === 1 ? "vez" : "veces"}</span></button>;
                  })}
                </div>
                <div className="text-xs text-slate-500 mt-3 font-medium text-center">Total: {room.players.length * room.settings.cycles} rondas</div>
              </div>
              {chat.length > 0 && (
                <div className="r-card p-3">
                  <div className="font-bold text-xs text-slate-500 uppercase tracking-wider mb-2">💬 Sala</div>
                  <div className="space-y-1 max-h-32 overflow-y-auto scroll-thin">{chat.slice(-15).map((m) => <ChatMessage key={m.id} m={m} />)}</div>
                </div>
              )}
              {isHost ? (
                <button onClick={start} disabled={!canStart} className="r-btn w-full py-4 rounded-2xl text-lg text-white font-bold" style={{ background: canStart ? "linear-gradient(135deg,#10B981,#06B6D4)" : "#CBD5E1", boxShadow: canStart ? "0 8px 24px rgba(16,185,129,.35)" : "none" }}>{canStart ? "▶️ EMPEZAR PARTIDA" : "Esperando más jugadores…"}</button>
              ) : (
                <div className="r-card-soft p-4 text-center text-sm font-bold" style={{ background: "#FEF3C7", color: "#A16207" }}>⏳ Esperando que el host inicie…</div>
              )}
              <button onClick={onLeave} className="r-btn w-full py-2.5 rounded-2xl font-bold text-slate-500 bg-white border border-slate-200">← Salir de la sala</button>
            </div>
          </div>
        );
      }

      // ============ GAME SCREEN ============
      function GameScreen({ room, you, chat, myWord, onLeave }) {
        const [color, setColor] = useState("#000000");
        const [brushSize, setBrushSize] = useState(8);
        const [isErasing, setIsErasing] = useState(false);
        const isDrawer = room.drawerId === you.id;
        const isHost = room.hostId === you.id;
        const drawer = room.players.find((p) => p.id === room.drawerId);
        const timerCritical = room.stage === "drawing" && room.timeLeft <= 10;
        const timerProgress = room.totalTime > 0 ? (room.timeLeft / room.totalTime) * 100 : 0;
        const handlePlayAgain = () => { if (!isHost) return; socket.emit("game:backToLobby"); setTimeout(() => socket.emit("game:start"), 200); };
        const isInfinite = room.totalRounds === 0; // públicas
        return (
          <div className="flex-1 flex flex-col overflow-hidden relative">
            <div className="px-3 pt-2 pb-2">
              <div className="r-card-soft p-2.5 flex items-center gap-2">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-1.5 mb-0.5">
                    <span className="text-[10px] font-bold uppercase tracking-wider text-slate-500">{isDrawer ? "Tu palabra" : "Adivina"}</span>
                    <span className="text-[10px] font-medium text-slate-400">· {room.letterCount} letras</span>
                  </div>
                  <div className="font-bold text-lg truncate" style={{ color: isDrawer ? "#6366F1" : "#1E293B", fontFamily: "monospace", letterSpacing: "0.2em" }}>
                    {isDrawer ? (myWord || "...").toUpperCase() : room.hint}
                  </div>
                </div>
                <div className={`shrink-0 rounded-xl px-3 py-2 text-center min-w-[68px] ${timerCritical ? "anim-pulse-warn" : ""}`} style={{ background: timerCritical ? "linear-gradient(135deg,#EF4444,#F97316)" : "linear-gradient(135deg,#6366F1,#8B5CF6)", color: "#fff", boxShadow: `0 4px 12px ${timerCritical ? "#EF444450" : "#6366F140"}` }}>
                  <div className="text-[9px] font-bold uppercase opacity-90 leading-none">{isInfinite ? `R${room.round}` : `R${room.round}/${room.totalRounds}`}</div>
                  <div className="font-bold leading-none mt-0.5" style={{ fontSize: "20px" }}>{formatTime(room.timeLeft)}</div>
                </div>
              </div>
              <div className="h-1 mt-1.5 bg-slate-200 rounded-full overflow-hidden">
                <div className="h-full transition-all duration-1000" style={{ width: `${timerProgress}%`, background: timerCritical ? "#EF4444" : "linear-gradient(90deg,#6366F1,#EC4899)" }} />
              </div>
            </div>
            <PlayerStrip players={room.players} drawerId={room.drawerId} correctGuessers={room.correctGuessers} youId={you.id} />
            <div className="px-3 relative">
              <DrawingCanvas isDrawer={isDrawer && room.stage === "drawing"} color={color} brushSize={brushSize} isErasing={isErasing} paused={false} />
            </div>
            <Toolbar isDrawer={isDrawer && room.stage === "drawing"} color={color} setColor={setColor} brushSize={brushSize} setBrushSize={setBrushSize} isErasing={isErasing} setIsErasing={setIsErasing} />
            <ChatPanel chat={chat} you={you} room={room} />
            {room.stage === "preRound" && drawer && <PreRoundOverlay drawer={drawer} isYouDrawer={isDrawer} myWord={myWord} letterCount={room.letterCount} />}
            {room.stage === "roundEnd" && room.lastResult && <RoundEndOverlay result={room.lastResult} players={room.players} drawerId={room.lastResult.drawerId || room.drawerId} />}
            {room.stage === "gameOver" && <GameOverOverlay players={room.players} isHost={isHost} onPlayAgain={handlePlayAgain} onLeave={onLeave} />}
          </div>
        );
      }

      // ============ APP ============
      function App() {
        const [connected, setConnected] = useState(socket.connected);
        const [you, setYou] = useState(null);
        const [room, setRoom] = useState(null);
        const [chat, setChat] = useState([]);
        const [myWord, setMyWord] = useState(null);
        const [error, setError] = useState(null);
        const [stats, setStats] = useState(null);
        const [busy, setBusy] = useState(false);

        useEffect(() => {
          const onConnect = () => setConnected(true);
          const onDisconnect = () => setConnected(false);
          const onRoomState = (state) => {
            setRoom(state);
            if (state.drawerId !== socket.id) setMyWord(null);
          };
          const onYourWord = ({ word }) => setMyWord(word);
          const onTick = ({ timeLeft }) => setRoom((prev) => prev ? { ...prev, timeLeft } : prev);
          const onChat = (msg) => setChat((prev) => [...prev, msg].slice(-200));
          socket.on("connect", onConnect);
          socket.on("disconnect", onDisconnect);
          socket.on("room:state", onRoomState);
          socket.on("game:yourWord", onYourWord);
          socket.on("game:tick", onTick);
          socket.on("chat:new", onChat);
          return () => {
            socket.off("connect", onConnect);
            socket.off("disconnect", onDisconnect);
            socket.off("room:state", onRoomState);
            socket.off("game:yourWord", onYourWord);
            socket.off("game:tick", onTick);
            socket.off("chat:new", onChat);
          };
        }, []);

        // Live stats poll
        useEffect(() => {
          if (room) return; // solo en el home
          let cancel = false;
          const fetchStats = async () => {
            try { const r = await fetch("/api/stats"); if (cancel) return; const d = await r.json(); setStats(d); } catch (e) {}
          };
          fetchStats();
          const id = setInterval(fetchStats, 10000);
          return () => { cancel = true; clearInterval(id); };
        }, [room]);

        const onQuickPlay = (name) => {
          setError(null); setBusy(true);
          socket.emit("room:quickjoin", { name }, (res) => {
            setBusy(false);
            if (!res?.ok) { setError(res?.error || "No se pudo entrar"); return; }
            setYou(res.you); setChat([]);
          });
        };
        const onCreate = (name, settings) => {
          setError(null); setBusy(true);
          socket.emit("room:create", { name, settings }, (res) => {
            setBusy(false);
            if (!res?.ok) { setError(res?.error || "No se pudo crear"); return; }
            setYou(res.you); setChat([]);
          });
        };
        const onJoin = (code, name) => {
          setError(null); setBusy(true);
          socket.emit("room:join", { code, name }, (res) => {
            setBusy(false);
            if (!res?.ok) { setError(res?.error || "No se pudo unir"); return; }
            setYou(res.you); setChat([]);
          });
        };
        const onLeave = () => {
          socket.emit("room:leave");
          setRoom(null); setYou(null); setChat([]); setMyWord(null);
        };

        const inRoom = !!room && !!you;
        const stage = room?.stage;

        return (
          <div className="min-h-screen w-full flex flex-col">
            <header className="px-3 py-2.5 flex items-center justify-between bg-white/70 backdrop-blur-md border-b border-slate-200/60 sticky top-0 z-30">
              <div className="flex items-center gap-2">
                <div className="w-9 h-9 rounded-xl flex items-center justify-center shadow-md" style={{ background: "linear-gradient(135deg,#6366F1,#EC4899)" }}>
                  <span style={{ fontSize: "18px" }}>🎨</span>
                </div>
                <div>
                  <div className="font-bold text-base leading-none" style={{ letterSpacing: "-0.01em" }}>
                    <span style={{ color: "#6366F1" }}>Rezo</span><span style={{ color: "#EC4899" }}>paint</span>
                  </div>
                  <div className="text-[10px] text-slate-500 leading-none mt-0.5 font-medium">GAME · Online</div>
                </div>
              </div>
              <div className="flex items-center gap-2">
                {inRoom && (
                  <>
                    <span className="text-[10px] font-bold px-1.5 py-0.5 rounded" style={{ background: room.type === "public" ? "#FEF3C7" : "#EEF2FF", color: room.type === "public" ? "#A16207" : "#4338CA" }}>
                      {room.type === "public" ? "🌍" : "🔒"}
                    </span>
                    <div className="px-2 py-1 rounded-lg text-xs font-bold" style={{ background: "#EEF2FF", color: "#4338CA" }}>{room.code}</div>
                  </>
                )}
                <div className="w-2 h-2 rounded-full" style={{ background: connected ? "#10B981" : "#EF4444" }} title={connected ? "Conectado" : "Sin conexión"} />
              </div>
            </header>
            <main className="flex-1 flex flex-col overflow-hidden">
              {!inRoom && <HomeScreen connected={connected} error={error} onQuickPlay={onQuickPlay} onCreate={onCreate} onJoin={onJoin} stats={stats} busy={busy} />}
              {inRoom && stage === "lobby" && <LobbyScreen room={room} you={you} chat={chat} onLeave={onLeave} />}
              {inRoom && stage === "waiting" && <WaitingScreen room={room} you={you} chat={chat} onLeave={onLeave} />}
              {inRoom && (stage === "preRound" || stage === "drawing" || stage === "roundEnd" || stage === "gameOver") && <GameScreen room={room} you={you} chat={chat} myWord={myWord} onLeave={onLeave} />}
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
